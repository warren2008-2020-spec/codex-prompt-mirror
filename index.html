<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Mirror</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Prompt Mirror V1</p>
        <h1>Codex 本地会话复盘</h1>
        <p class="lede">读取本机真实会话 JSONL，汇总最近线程的提示词清晰度、扩题风险和协作复盘信号。</p>
      </div>
      <div class="hero-meta">
        <span class="pill">Local only</span>
        <span class="pill">Read only</span>
        <span class="pill">Real sessions</span>
      </div>
    </section>

    <section id="status" class="status-card loading">
      正在读取本地 Codex 会话...
    </section>

    <section class="stats-grid" id="overview"></section>

    <section class="content-grid">
      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="label">Thread Review</p>
            <h2>最近线程</h2>
          </div>
          <span id="rootHint" class="hint"></span>
        </div>
        <div id="threadList" class="thread-list"></div>
      </article>

      <aside class="side-stack">
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="label">Signals</p>
              <h2>复盘信号</h2>
            </div>
          </div>
          <div id="signals" class="signal-list"></div>
        </article>

        <article class="panel accent-panel">
          <div class="panel-head">
            <div>
              <p class="label">Recommended Action</p>
              <h2>系统建议</h2>
            </div>
          </div>
          <div id="actionBlock" class="action-block"></div>
        </article>
      </aside>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
